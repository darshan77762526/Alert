name: SHEIN Stock Scanner
on:
  schedule:
    - cron: '*/15 * * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requirements & Playwright
        run: |
          pip install requests playwright
          playwright install chromium

      - name: Run Playwright Scanner
        run: python bot.py

      - name: Save Tracking Data
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add sent_items.json || true
          git commit -m "Update tracked items" || echo "No changes to commit"
          git push || echo "Nothing to push"
          
